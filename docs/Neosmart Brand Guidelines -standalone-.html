  <style>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

}\n<\u002Fstyle>\n\n<style>\n  :root {\n    --ink: #1A1613;\n    --ink-soft: #262019;\n    --paper: #ECE4D4;\n    --paper-2: #E3D9C4;\n    --oxblood: #7A2E2B;\n    --clay: #B4552F;\n    --ochre: #B98A2E;\n    --taupe: #7E7362;\n    --taupe-lt: #B7AC98;\n    --line: rgba(26, 22, 19, 0.16);\n    --line-2: rgba(26, 22, 19, 0.30);\n    --line-ink: rgba(236, 228, 212, 0.16);\n    --line-ink-2: rgba(236, 228, 212, 0.34);\n    --font: \"Hanken Grotesk\", \"Inter\", system-ui, -apple-system, sans-serif;\n    --serif: \"Newsreader\", Georgia, serif;\n    --wrap: 1060px;\n  }\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n  html { scroll-behavior: smooth; }\n  \n  body { font-family: var(--font); background: var(--paper); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }\n  .wrap { max-width: var(--wrap); margin: 0 auto; padding: 0 32px; }\n  \n\n  /* type helpers */\n  .eyebrow { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; color: var(--taupe); display: inline-flex; align-items: center; gap: 10px; }\n  .eyebrow::before { content: \"\"; width: 1px; height: 13px; background: var(--oxblood); display: inline-block; }\n  .section-title { font-size: 2.05rem; font-weight: 700; letter-spacing: -0.02em; line-height: 1.12; margin: 16px 0 0; }\n  .lede { font-size: 1.0625rem; color: var(--taupe); max-width: 62ch; margin-top: 14px; }\n  p.body { font-size: 1.0625rem; max-width: 64ch; }\n  p.body + p.body { margin-top: 14px; }\n  .dot { color: var(--oxblood); }\n\n  /* measure ruler — the signature */\n  .ruler { height: 22px; background-image: repeating-linear-gradient(90deg, var(--line-2) 0 1px, transparent 1px 10px), repeating-linear-gradient(90deg, var(--ink) 0 1px, transparent 1px 60px); background-size: 100% 8px, 100% 22px; background-repeat: repeat-x; background-position: bottom; border-bottom: 1px solid var(--ink); }\n  .ruler.on-ink { background-image: repeating-linear-gradient(90deg, var(--line-ink-2) 0 1px, transparent 1px 10px), repeating-linear-gradient(90deg, var(--paper) 0 1px, transparent 1px 60px); border-bottom-color: var(--paper); }\n\n  section { padding: 84px 0; border-bottom: 1px solid var(--line); }\n  \n\n  /* ===== COVER ===== */\n  .cover { background: var(--ink); color: var(--paper); border-bottom: none; padding: 0; }\n  .cover .inner { padding: 96px 0 72px; }\n  .cover .meta { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.2em; color: var(--taupe-lt); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; padding-bottom: 40px; }\n  .wordmark { font-weight: 800; letter-spacing: -0.035em; line-height: 0.9; font-size: 9rem; color: var(--paper); }\n  .cover .tagline { font-size: 1.5rem; font-weight: 500; letter-spacing: -0.01em; margin-top: 26px; }\n  .cover .oneline { margin-top: 20px; max-width: 52ch; color: var(--taupe-lt); font-size: 1.0625rem; }\n  .cover-fade { opacity: 1; }\n  \n  \n\n  /* ===== CHAPTER DIVIDER ===== */\n  .divider { background: var(--ink); color: var(--paper); border-bottom: none; padding: 0; }\n  .divider .inner { padding: 60px 0; display: flex; justify-content: space-between; align-items: baseline; gap: 20px; flex-wrap: wrap; }\n  .divider .num { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.2em; color: var(--oxblood); }\n  .divider .name { font-size: 3rem; font-weight: 800; letter-spacing: -0.03em; }\n  .divider .desc { color: var(--taupe-lt); font-size: 0.92rem; max-width: 34ch; text-align: right; }\n  \n\n  /* ===== ESSENTIALS ===== */\n  .essentials { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-top: 40px; }\n  .essentials .cell { background: var(--paper); padding: 26px 24px; }\n  .essentials .k { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--taupe); font-weight: 600; }\n  .essentials .v { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; margin-top: 10px; }\n  \n  \n\n  /* ===== THE IDEA ===== */\n  .idea { font-size: 2.7rem; font-weight: 600; letter-spacing: -0.02em; line-height: 1.22; max-width: 20ch; margin-top: 34px; }\n  .idea b { font-weight: 600; color: var(--oxblood); }\n\n  /* ===== POSITIONING ===== */\n  .positioning { font-size: 1.5rem; line-height: 1.5; max-width: 50ch; font-weight: 500; letter-spacing: -0.012em; border-left: 2px solid var(--oxblood); padding-left: 24px; margin-top: 30px; }\n\n  /* ===== AUDIENCE ===== */\n  .aud { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); margin-top: 34px; }\n  .aud .col { background: var(--paper); padding: 28px 26px; }\n  .aud .tier { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--oxblood); font-weight: 700; }\n  .aud h4 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.02em; margin: 10px 0 14px; }\n  .aud ul { list-style: none; }\n  .aud li { font-size: 0.98rem; padding: 7px 0 7px 18px; position: relative; color: var(--ink); }\n  .aud li::before { content: \"\"; position: absolute; left: 0; top: 15px; width: 9px; height: 1px; background: var(--oxblood); }\n  \n\n  /* ===== EXPRESSION (trait but not opposite) ===== */\n  .expr { margin-top: 34px; border-top: 1px solid var(--line); }\n  .expr .row { display: grid; grid-template-columns: 260px 1fr; gap: 24px; align-items: baseline; padding: 22px 0; border-bottom: 1px solid var(--line); }\n  .expr .pair { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }\n  .expr .pair em { font-style: normal; color: var(--taupe); font-weight: 500; }\n  .expr .pair .not { color: var(--oxblood); font-weight: 500; }\n  .expr .note { font-size: 1rem; color: var(--ink); }\n  \n\n  /* ===== TRUTHS ===== */\n  .truths { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 34px; }\n  .truths .t { border-top: 2px solid var(--ink); padding-top: 16px; }\n  .truths .t h4 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.015em; }\n  .truths .t p { font-size: 0.96rem; color: var(--taupe); margin-top: 8px; }\n  \n\n  /* ===== LOGO ===== */\n  .logo-stage { background: var(--paper-2); border: 1px solid var(--line); padding: 60px; margin-top: 36px; display: flex; align-items: center; justify-content: center; position: relative; }\n  .logo-stage .mark { font-size: 4.4rem; font-weight: 800; letter-spacing: -0.035em; color: var(--ink); }\n  .clearspace { position: absolute; inset: 24px; border: 1px dashed var(--line-2); pointer-events: none; }\n  .clearspace span { position: absolute; font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--taupe); background: var(--paper-2); padding: 0 6px; top: -8px; left: 50%; transform: translateX(-50%); }\n\n  .arch { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }\n  \n  .arch .box { border: 1px solid var(--line); padding: 26px 24px; background: var(--paper); }\n  .arch .box .tag { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--oxblood); font-weight: 700; }\n  .arch .box .big { font-weight: 800; letter-spacing: -0.03em; font-size: 2rem; margin: 16px 0 6px; }\n  .arch .box .role { font-size: 0.92rem; color: var(--taupe); }\n\n  .sizes { display: flex; align-items: flex-end; gap: 40px; margin-top: 34px; flex-wrap: wrap; border: 1px solid var(--line); padding: 30px; background: var(--paper); }\n  .sizes .s { text-align: left; }\n  .sizes .s .wm { font-weight: 800; letter-spacing: -0.03em; color: var(--ink); }\n  .sizes .s small { display: block; margin-top: 12px; font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--taupe); }\n\n  .lockrow { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }\n  \n  .lockup { border: 1px solid var(--line); padding: 22px 24px; background: var(--paper); }\n  .lockup.dark { background: var(--ink); }\n  .lockup .lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--taupe); font-weight: 600; }\n  .lockup.dark .lbl { color: var(--taupe-lt); }\n  .lockup .demo { margin-top: 18px; font-weight: 800; letter-spacing: -0.03em; font-size: 1.9rem; }\n  .lockup.dark .demo { color: var(--paper); }\n  .lockup .demo.caps { letter-spacing: 0.02em; font-size: 1.5rem; }\n\n  /* ===== MISUSE ===== */\n  .misuse { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--line); border: 1px solid var(--line); margin-top: 30px; }\n  .mis { background: var(--paper); padding: 30px 18px 22px; text-align: center; position: relative; }\n  .mis .d { font-weight: 800; letter-spacing: -0.03em; font-size: 1.4rem; color: var(--ink); display: inline-block; }\n  .mis .x { position: absolute; top: 12px; right: 14px; color: var(--oxblood); font-weight: 700; }\n  .mis .lbl { display: block; margin-top: 18px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--taupe); }\n  \n  \n\n  /* ===== COLOUR ===== */\n  .swatches { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 36px; }\n  \n  \n  .sw { border: 1px solid var(--line); }\n  .sw .chip { height: 120px; display: flex; align-items: flex-end; padding: 14px; }\n  .sw .chip .role { font-size: 0.64rem; text-transform: uppercase; letter-spacing: 0.14em; font-weight: 600; }\n  .sw .meta { padding: 14px; background: var(--paper); }\n  .sw .name { font-weight: 700; letter-spacing: -0.01em; }\n  .sw .spec { font-size: 0.78rem; color: var(--taupe); margin-top: 6px; font-variant-numeric: tabular-nums; line-height: 1.5; }\n\n  .accent-note { margin-top: 34px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 40px; align-items: start; }\n  \n  .accent-options { display: flex; gap: 14px; }\n  .ao { text-align: center; flex: 1; }\n  .ao .dot-lg { height: 64px; border: 1px solid var(--line); }\n  .ao.sel .dot-lg { outline: 2px solid var(--ink); outline-offset: 3px; }\n  .ao .pick { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--oxblood); font-weight: 700; margin-top: 10px; height: 12px; }\n  .ao .tag { font-size: 0.72rem; margin-top: 2px; font-weight: 600; }\n  .ao .tag small { display: block; color: var(--taupe); font-weight: 400; font-variant-numeric: tabular-nums; }\n\n  .ratio { display: flex; height: 46px; border: 1px solid var(--line); margin-top: 24px; overflow: hidden; }\n  .ratio i { display: flex; align-items: center; padding-left: 12px; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.08em; }\n  .ratio .r-paper { flex: 0 0 70%; background: var(--paper-2); color: var(--taupe); }\n  .ratio .r-ink { flex: 0 0 25%; background: var(--ink); color: var(--taupe-lt); }\n  .ratio .r-ox { flex: 1; background: var(--oxblood); color: #E9D9CE; padding-left: 8px; }\n  .ratio-cap { font-size: 0.86rem; color: var(--taupe); margin-top: 12px; max-width: 60ch; }\n\n  /* ===== TYPOGRAPHY ===== */\n  .scale { margin-top: 36px; border-top: 1px solid var(--line); }\n  .scale .row { display: grid; grid-template-columns: 150px 1fr; gap: 20px; align-items: baseline; padding: 20px 0; border-bottom: 1px solid var(--line); }\n  \n  .scale .spec { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--taupe); font-weight: 600; padding-top: 6px; font-variant-numeric: tabular-nums; }\n  .t-display { font-size: 4.2rem; font-weight: 800; letter-spacing: -0.035em; line-height: 0.95; }\n  .t-h1 { font-size: 2.6rem; font-weight: 700; letter-spacing: -0.025em; }\n  .t-h2 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.015em; }\n  .t-body { font-size: 1.0625rem; font-weight: 400; }\n  .t-label { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.18em; }\n\n  .weights { display: flex; flex-wrap: wrap; gap: 26px; margin-top: 34px; }\n  .weights div { font-size: 1.6rem; letter-spacing: -0.02em; }\n  .weights small { display: block; font-size: 0.64rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--taupe); margin-top: 6px; font-weight: 600; }\n\n  .rules-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; }\n  \n  .rules-grid h4 { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--taupe); margin-bottom: 16px; }\n  .demo-line { border-left: 2px solid var(--line); padding: 6px 0 6px 16px; margin-bottom: 14px; }\n  .demo-line.good { border-left-color: var(--oxblood); }\n  .demo-line .tx { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.02em; color: var(--ink); }\n  .demo-line .lbl { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--taupe); margin-top: 4px; }\n  .lead-loose { line-height: 2.1; } .lead-tight { line-height: 1.05; } .lead-right { line-height: 1.5; }\n  .track-loose { letter-spacing: 0.08em; } .track-tight { letter-spacing: -0.09em; } .track-right { letter-spacing: -0.035em; }\n\n  /* ===== MOTIF ===== */\n  .motif-demos { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; margin-top: 34px; }\n  \n  .md { border: 1px solid var(--line); padding: 22px; background: var(--paper); }\n  .md .cap { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--taupe); font-weight: 600; margin-top: 16px; }\n  .tick-list { list-style: none; }\n  .tick-list li { position: relative; padding: 8px 0 8px 20px; font-size: 0.98rem; }\n  .tick-list li::before { content: \"\"; position: absolute; left: 0; top: 14px; width: 1px; height: 11px; background: var(--oxblood); }\n  .tick-vert { display: flex; gap: 5px; align-items: flex-end; height: 70px; }\n  .tick-vert i { width: 1px; background: var(--ink); }\n\n  /* ===== VOICE ===== */\n  .voice-grid { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 40px; margin-top: 36px; }\n  \n  .bignum { font-size: 7.5rem; font-weight: 800; letter-spacing: -0.05em; line-height: 0.8; color: var(--ink); }\n  .bignum small { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--taupe); margin-top: 22px; line-height: 1.5; }\n  .refusal { border-left: 2px solid var(--oxblood); padding: 4px 0 4px 20px; margin-top: 8px; }\n  .refusal p { font-size: 1.15rem; font-weight: 500; letter-spacing: -0.01em; }\n  .refusal p + p { margin-top: 16px; }\n  .words { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px; }\n  \n  .words h4 { font-size: 0.74rem; text-transform: uppercase; letter-spacing: 0.14em; margin-bottom: 14px; }\n  .words .own h4 { color: var(--ink); } .words .ban h4 { color: var(--oxblood); }\n  .chips { display: flex; flex-wrap: wrap; gap: 8px; }\n  .chip-w { font-size: 0.86rem; border: 1px solid var(--line-2); padding: 5px 11px; }\n  .ban .chip-w { color: var(--taupe); border-color: var(--line); text-decoration: line-through; text-decoration-color: var(--oxblood); }\n\n  /* ===== IN ACTION ===== */\n  .preview { background: var(--ink); color: var(--paper); border: 1px solid var(--ink); margin-top: 36px; }\n  .preview .pv-nav { display: flex; justify-content: space-between; align-items: center; padding: 22px 30px; border-bottom: 1px solid var(--line-ink); }\n  .preview .pv-nav .pm { font-weight: 800; letter-spacing: -0.03em; font-size: 1.2rem; }\n  .preview .pv-nav .pn { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--taupe-lt); }\n  .preview .pv-body { padding: 72px 30px 60px; }\n  .preview .pv-eyebrow { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--taupe-lt); display: inline-flex; gap: 10px; align-items: center; }\n  .preview .pv-eyebrow::before { content: \"\"; width: 1px; height: 13px; background: var(--oxblood); }\n  .preview h2.pv-head { font-size: 4rem; font-weight: 800; letter-spacing: -0.035em; line-height: 0.98; margin-top: 20px; max-width: 16ch; }\n  .preview .pv-sub { color: var(--taupe-lt); max-width: 48ch; margin-top: 22px; font-size: 1.0625rem; }\n  .preview .pv-cta { display: inline-block; margin-top: 34px; background: var(--oxblood); color: var(--paper); padding: 13px 26px; font-weight: 600; font-size: 0.95rem; text-decoration: none; }\n  .preview .pv-cta:focus-visible { outline: 2px solid var(--paper); outline-offset: 3px; }\n  .preview .pv-note { font-size: 0.8rem; color: var(--taupe-lt); margin-top: 16px; }\n\n  .apps { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }\n  \n  .app { border: 1px solid var(--line); background: var(--paper); padding: 26px; }\n  .app .cap { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--taupe); font-weight: 600; margin-bottom: 18px; }\n  /* email signature */\n  .sig { font-size: 0.92rem; line-height: 1.5; }\n  .sig .nm { font-weight: 700; letter-spacing: -0.01em; }\n  .sig .rl { color: var(--taupe); }\n  .sig .wm { font-weight: 800; letter-spacing: -0.03em; font-size: 1.15rem; margin-top: 10px; }\n  .sig .ct { color: var(--taupe); margin-top: 4px; }\n  /* doc cover */\n  .cover-doc { background: var(--ink); color: var(--paper); aspect-ratio: 4/3; padding: 26px; display: flex; flex-direction: column; justify-content: space-between; }\n  .cover-doc .wm { font-weight: 800; letter-spacing: -0.03em; font-size: 1.25rem; }\n  .cover-doc .mid .lb { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.16em; color: var(--taupe-lt); }\n  .cover-doc .mid .ti { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-top: 8px; line-height: 1.1; }\n  .cover-doc .ft { font-size: 0.72rem; color: var(--taupe-lt); }\n  /* favicon tiles */\n  .favs { display: flex; gap: 14px; align-items: flex-end; }\n  .fav { background: var(--ink); color: var(--paper); display: flex; align-items: center; justify-content: center; font-weight: 800; letter-spacing: -0.02em; }\n  .fav.s1 { width: 64px; height: 64px; font-size: 1.9rem; }\n  .fav.s2 { width: 40px; height: 40px; font-size: 1.2rem; }\n  .fav.s3 { width: 24px; height: 24px; font-size: 0.8rem; }\n\n  footer { background: var(--ink); color: var(--taupe-lt); padding: 40px 0; border-bottom: none; }\n  footer .fr { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; font-size: 0.78rem; letter-spacing: 0.04em; }\n  a { color: inherit; }\n  :focus-visible { outline: 2px solid var(--oxblood); outline-offset: 2px; }\n\n  html, body { width: 1440px; min-width: 1440px; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<!-- ===== COVER ===== -->\n<header class=\"cover\">\n  <div class=\"wrap inner\">\n    <div class=\"meta cover-fade\"><span>Neosmart — Brand Guidelines<\u002Fspan><span>Version 2.0<\u002Fspan><\u002Fdiv>\n    <div class=\"wordmark cover-fade d2\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv>\n    <div class=\"tagline cover-fade d3\">Made for one.<\u002Fdiv>\n    <p class=\"oneline cover-fade d4\">A studio that builds intelligent systems, products, and brands around you — designed and built by the same people, and yours to keep.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"ruler on-ink\" aria-hidden=\"true\"><\u002Fdiv>\n<\u002Fheader>\n\n<!-- ===== ESSENTIALS ===== -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Quick reference<\u002Fspan>\n    <h2 class=\"section-title\">The brand, in four cells.<\u002Fh2>\n    <div class=\"essentials\">\n      <div class=\"cell\"><div class=\"k\">Brand<\u002Fdiv><div class=\"v\">Neosmart<\u002Fdiv><\u002Fdiv>\n      <div class=\"cell\"><div class=\"k\">Noun<\u002Fdiv><div class=\"v\">studio<\u002Fdiv><\u002Fdiv>\n      <div class=\"cell\"><div class=\"k\">Tagline<\u002Fdiv><div class=\"v\">Made for one.<\u002Fdiv><\u002Fdiv>\n      <div class=\"cell\"><div class=\"k\">Promise<\u002Fdiv><div class=\"v\">Yours to keep<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CH.01 FOUNDATION ============ -->\n<section class=\"divider\">\n  <div class=\"wrap inner\">\n    <div><div class=\"num\">01<\u002Fdiv><div class=\"name\">Foundation<\u002Fdiv><\u002Fdiv>\n    <div class=\"desc\">What the brand believes, who it's for, and how it behaves — before a single pixel.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ruler on-ink\" aria-hidden=\"true\"><\u002Fdiv>\n<\u002Fsection>\n\n<!-- THE IDEA -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">The idea<\u002Fspan>\n    <h2 class=\"section-title\">One sentence the whole brand grows from.<\u002Fh2>\n    <p class=\"idea\">We build the systems, products, and brands our clients need — <b>around them, and theirs to keep.<\u002Fb><\u002Fp>\n    <p class=\"body\" style=\"margin-top:26px\">Everything downstream — the voice, the type, the colour, the way a call is run — is this idea, expressed. The studio is not the subject. The client is. Neosmart's job is to build the thing itself, put the same hands on it start to finish, and hand it over working.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- POSITIONING -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Positioning<\u002Fspan>\n    <h2 class=\"section-title\">Said plainly, from the client's side.<\u002Fh2>\n    <p class=\"positioning\">For founders and operators who want their systems, products, and brand built around their business and handed over as theirs to own — Neosmart puts the same hands on the work from first sketch to running result, and builds everything to keep working after it leaves.<\u002Fp>\n    <p class=\"body\" style=\"margin-top:24px\">The category sells throughput and speed. Neosmart gives each client the studio's full attention and leaves them owning the outcome. That difference is the whole position — and it's checkable, not claimed.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- AUDIENCE -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Audience<\u002Fspan>\n    <h2 class=\"section-title\">Who it's for — and who it isn't.<\u002Fh2>\n    <div class=\"aud\">\n      <div class=\"col\">\n        <div class=\"tier\">Primary — the client<\u002Fdiv>\n        <h4>Founders &amp; operators who want to own what's built.<\u002Fh4>\n        <ul>\n          <li>Funded startups and established businesses modernising.<\u002Fli>\n          <li>Teams burned by handoffs, junior swaps, and dead deliverables.<\u002Fli>\n          <li>People who want systems their own team runs — not a rented black box.<\u002Fli>\n          <li>Buyers who read undivided attention as the real mark of quality.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div class=\"col\">\n        <div class=\"tier\">Not for<\u002Fdiv>\n        <h4>The work we turn down, in our own words.<\u002Fh4>\n        <ul>\n          <li>“We don't accept projects where design is treated as decoration.”<\u002Fli>\n          <li>“We work with founders who value clarity over speed.”<\u002Fli>\n          <li>Anyone shopping the cheapest quote across five vendors — we don't bid.<\u002Fli>\n          <li>Staff augmentation — we don't rent hours.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- EXPRESSION -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Expression<\u002Fspan>\n    <h2 class=\"section-title\">Personality, defined by its guardrails.<\u002Fh2>\n    <p class=\"lede\">Each trait is held in place by what it must never become. The guardrail is what keeps the brand from drifting into parody.<\u002Fp>\n    <div class=\"expr\">\n      <div class=\"row\"><div class=\"pair\">Devoted, <span class=\"not\">not servile<\u002Fspan><\u002Fdiv><div class=\"note\">Full attention, shown in the work — never flattery or fawning.<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div class=\"pair\">Exacting, <span class=\"not\">not cold<\u002Fspan><\u002Fdiv><div class=\"note\">Details in service of the client, never in service of superiority.<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div class=\"pair\">Quiet, <span class=\"not\">not vague<\u002Fspan><\u002Fdiv><div class=\"note\">Quiet about selling, precise about facts. Says less, means it.<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div class=\"pair\">Assured, <span class=\"not\">not arrogant<\u002Fspan><\u002Fdiv><div class=\"note\">Comfortable saying no — never a velvet rope or an exclusivity act.<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div class=\"pair\">Unhurried, <span class=\"not\">not slow<\u002Fspan><\u002Fdiv><div class=\"note\">Built to last, not shipped fast. A quality standard, not a pace complaint.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- THREE TRUTHS -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">What's true for the client<\u002Fspan>\n    <h2 class=\"section-title\">The three things every engagement guarantees.<\u002Fh2>\n    <div class=\"truths\">\n      <div class=\"t\"><h4>Built around you<\u002Fh4><p>We build around your business and how it actually works — you're the brief, not a template we fit you into.<\u002Fp><\u002Fdiv>\n      <div class=\"t\"><h4>The same hands, start to finish<\u002Fh4><p>The people who design your work build it and stay with it. Your contact is the person making the thing.<\u002Fp><\u002Fdiv>\n      <div class=\"t\"><h4>Yours to keep<\u002Fh4><p>Everything ends in something you own and run — a system, product, or brand that keeps working after we're gone.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CH.02 IDENTITY ============ -->\n<section class=\"divider\">\n  <div class=\"wrap inner\">\n    <div><div class=\"num\">02<\u002Fdiv><div class=\"name\">Identity<\u002Fdiv><\u002Fdiv>\n    <div class=\"desc\">The wordmark and its rules — the studio's most recognisable signature.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ruler on-ink\" aria-hidden=\"true\"><\u002Fdiv>\n<\u002Fsection>\n\n<!-- WORDMARK -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">The wordmark<\u002Fspan>\n    <h2 class=\"section-title\">A word, not a compound. One capital.<\u002Fh2>\n    <p class=\"lede\">Neosmart is set as a single, composed word — never a mark, mascot, or gradient. The full stop is the one place the accent appears: a small punctuation of finality that says the work is finished.<\u002Fp>\n    <div class=\"logo-stage\">\n      <div class=\"clearspace\" aria-hidden=\"true\"><span>clear space = height of the “N”, all sides<\u002Fspan><\u002Fdiv>\n      <div class=\"mark\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"lockrow\">\n      <div class=\"lockup\"><div class=\"lbl\">Primary · on paper<\u002Fdiv><div class=\"demo\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"lockup dark\"><div class=\"lbl\">Reversed · on ink<\u002Fdiv><div class=\"demo\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ARCHITECTURE -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Logo architecture<\u002Fspan>\n    <h2 class=\"section-title\">Two layers. One is public, one is paperwork.<\u002Fh2>\n    <p class=\"lede\">There is no sub-brand system to manage — only the brand you show and the legal name you're registered under. They never compete because they live in different places.<\u002Fp>\n    <div class=\"arch\">\n      <div class=\"box\"><div class=\"tag\">Brand · everywhere<\u002Fdiv><div class=\"big\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv><div class=\"role\">The wordmark, all copy, email sender names, the site, every surface a client sees.<\u002Fdiv><\u002Fdiv>\n      <div class=\"box\"><div class=\"tag\">Legal · paperwork only<\u002Fdiv><div class=\"big\" style=\"font-size:1.5rem\">Neosmart Labs<\u002Fdiv><div class=\"role\">Footer copyright, contracts, invoices, terms &amp; privacy. Never written into brand copy or headlines.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"lockrow\">\n      <div class=\"lockup\"><div class=\"lbl\">Caps lockup · marks &amp; favicons<\u002Fdiv><div class=\"demo caps\">NEOSMART<\u002Fdiv><\u002Fdiv>\n      <div class=\"lockup\"><div class=\"lbl\">Monogram · square / avatar<\u002Fdiv><div class=\"demo\">N<span class=\"dot\">.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CLEAR SPACE + SIZE -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Clear space &amp; minimum size<\u002Fspan>\n    <h2 class=\"section-title\">The “N” rule. Give it room; never crowd it.<\u002Fh2>\n    <p class=\"lede\">Keep clear space equal to the height of the capital N on every side — nothing encroaches. Below the minimum sizes, switch to the caps lockup or the monogram, which hold up smaller.<\u002Fp>\n    <div class=\"sizes\">\n      <div class=\"s\"><div class=\"wm\" style=\"font-size:2.4rem\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv><small>Wordmark · min 120px wide (screen) · 20mm (print)<\u002Fsmall><\u002Fdiv>\n      <div class=\"s\"><div class=\"wm caps\" style=\"font-size:1.1rem; letter-spacing:0.03em\">NEOSMART<\u002Fdiv><small>Caps · min 72px<\u002Fsmall><\u002Fdiv>\n      <div class=\"s\"><div class=\"wm\" style=\"font-size:1.1rem\">N<span class=\"dot\">.<\u002Fspan><\u002Fdiv><small>Monogram · min 24px · favicon<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MISUSE -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Misuse<\u002Fspan>\n    <h2 class=\"section-title\">Eight things that break the wordmark.<\u002Fh2>\n    <p class=\"lede\">A studio that claims it finishes things properly cannot ship a broken mark. These are non-negotiable.<\u002Fp>\n    <div class=\"misuse\">\n      <div class=\"mis\"><span class=\"x\">✕<\u002Fspan><span class=\"d\">NeoSmart<span class=\"dot\">.<\u002Fspan><\u002Fspan><span class=\"lbl\">No mid-word capital<\u002Fspan><\u002Fdiv>\n      <div class=\"mis\"><span class=\"x\">✕<\u002Fspan><span class=\"d\">◆ Neosmart<\u002Fspan><span class=\"lbl\">No icon or symbol<\u002Fspan><\u002Fdiv>\n      <div class=\"mis\"><span class=\"x\">✕<\u002Fspan><span class=\"d\" style=\"display:inline-block;transform:scaleX(1.6)\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fspan><span class=\"lbl\">Don't stretch<\u002Fspan><\u002Fdiv>\n      <div class=\"mis\"><span class=\"x\">✕<\u002Fspan><span class=\"d\" style=\"display:inline-block;transform:skewX(-13deg)\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fspan><span class=\"lbl\">Don't skew<\u002Fspan><\u002Fdiv>\n      <div class=\"mis\"><span class=\"x\">✕<\u002Fspan><span class=\"d\" style=\"color:transparent;-webkit-text-stroke:1px var(--ink)\">Neosmart.<\u002Fspan><span class=\"lbl\">Don't outline<\u002Fspan><\u002Fdiv>\n      <div class=\"mis\"><span class=\"x\">✕<\u002Fspan><span class=\"d\" style=\"color:var(--oxblood)\">Neosmart.<\u002Fspan><span class=\"lbl\">Not all in accent<\u002Fspan><\u002Fdiv>\n      <div class=\"mis\"><span class=\"x\">✕<\u002Fspan><span class=\"d\" style=\"text-shadow:3px 3px 0 var(--line-2)\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fspan><span class=\"lbl\">No drop shadow<\u002Fspan><\u002Fdiv>\n      <div class=\"mis\"><span class=\"x\">✕<\u002Fspan><span class=\"d\" style=\"font-family:var(--serif);font-style:italic;font-weight:400\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fspan><span class=\"lbl\">No other typeface<\u002Fspan><\u002Fdiv>\n      <div class=\"mis\"><span class=\"x\">✕<\u002Fspan><span class=\"d\" style=\"display:inline-block;transform:rotate(-8deg)\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fspan><span class=\"lbl\">Don't rotate<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CH.03 VISUAL LANGUAGE ============ -->\n<section class=\"divider\">\n  <div class=\"wrap inner\">\n    <div><div class=\"num\">03<\u002Fdiv><div class=\"name\">Visual language<\u002Fdiv><\u002Fdiv>\n    <div class=\"desc\">Colour, type, and the one signature that carries the made-for-one idea.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ruler on-ink\" aria-hidden=\"true\"><\u002Fdiv>\n<\u002Fsection>\n\n<!-- COLOUR -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Colour<\u002Fspan>\n    <h2 class=\"section-title\">Ink, paper, and one restrained accent.<\u002Fh2>\n    <p class=\"lede\">Two working colours and a single accent used sparingly. No second accent, no gradients, no tech-blue. The accent means more the less it appears.<\u002Fp>\n    <div class=\"swatches\">\n      <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ink)\"><span class=\"role\" style=\"color:var(--taupe-lt)\">Text · dark grounds<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"name\">Ink<\u002Fdiv><div class=\"spec\">HEX #1A1613<br>RGB 26 · 22 · 19<br>CMYK 0 · 16 · 26 · 90<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:var(--paper);border-bottom:1px solid var(--line)\"><span class=\"role\" style=\"color:var(--taupe)\">Backgrounds · paper<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"name\">Paper (oat)<\u002Fdiv><div class=\"spec\">HEX #ECE4D4<br>RGB 236 · 228 · 212<br>CMYK 0 · 3 · 10 · 7<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:var(--oxblood)\"><span class=\"role\" style=\"color:#E9D9CE\">Accent · sparingly<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"name\">Oxblood<\u002Fdiv><div class=\"spec\">HEX #7A2E2B<br>RGB 122 · 46 · 43<br>CMYK 0 · 62 · 65 · 52<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:var(--paper-2);border-bottom:1px solid var(--line)\"><span class=\"role\" style=\"color:var(--taupe)\">Panels · raised paper<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"name\">Paper deep<\u002Fdiv><div class=\"spec\">HEX #E3D9C4<br>RGB 227 · 217 · 196<br>CMYK 0 · 4 · 14 · 11<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:var(--taupe)\"><span class=\"role\" style=\"color:#efe9dd\">Secondary text<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"name\">Taupe<\u002Fdiv><div class=\"spec\">HEX #7E7362<br>RGB 126 · 115 · 98<br>CMYK 0 · 9 · 22 · 51<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"sw\"><div class=\"chip\" style=\"background:var(--ink-soft)\"><span class=\"role\" style=\"color:var(--taupe-lt)\">Raised dark panels<\u002Fspan><\u002Fdiv><div class=\"meta\"><div class=\"name\">Ink soft<\u002Fdiv><div class=\"spec\">HEX #262019<br>RGB 38 · 32 · 25<br>CMYK 0 · 16 · 34 · 85<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"accent-note\">\n      <div>\n        <span class=\"eyebrow\">The accent — locked<\u002Fspan>\n        <p class=\"body\" style=\"margin-top:14px\">Oxblood is the accent — deep enough to read as considered, and deliberately not the bright terracotta that has become the default everywhere. Clay and ochre were considered and set aside. Only one accent exists, and it never appears in gradients.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"accent-options\">\n        <div class=\"ao sel\"><div class=\"dot-lg\" style=\"background:var(--oxblood)\"><\u002Fdiv><div class=\"pick\">Selected<\u002Fdiv><div class=\"tag\">Oxblood<small>#7A2E2B<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n        <div class=\"ao\"><div class=\"dot-lg\" style=\"background:var(--clay);opacity:0.45\"><\u002Fdiv><div class=\"pick\">&nbsp;<\u002Fdiv><div class=\"tag\" style=\"color:var(--taupe)\">Clay<small>considered<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n        <div class=\"ao\"><div class=\"dot-lg\" style=\"background:var(--ochre);opacity:0.45\"><\u002Fdiv><div class=\"pick\">&nbsp;<\u002Fdiv><div class=\"tag\" style=\"color:var(--taupe)\">Ochre<small>considered<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"ratio\" aria-hidden=\"true\">\n      <i class=\"r-paper\">Paper · ~70%<\u002Fi><i class=\"r-ink\">Ink · ~25%<\u002Fi><i class=\"r-ox\">~5%<\u002Fi>\n    <\u002Fdiv>\n    <p class=\"ratio-cap\">Working ratio: paper dominates, ink structures, the accent is a sliver. Ink or paper appears on every surface; the accent never exceeds roughly one-twentieth of it. If the accent stops feeling special, there's too much of it.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TYPOGRAPHY -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Typography<\u002Fspan>\n    <h2 class=\"section-title\">One grotesk. Character from setting, not letterforms.<\u002Fh2>\n    <p class=\"lede\">A single neutral grotesk across everything, separated by weight, scale, and tracking — no second face to pair. Recommended licensed face: <strong>Neue Haas Grotesk<\u002Fstrong> or <strong>Söhne<\u002Fstrong>. Shown here in <strong>Hanken Grotesk<\u002Fstrong>, the accessible fallback.<\u002Fp>\n\n    <div class=\"scale\">\n      <div class=\"row\"><div class=\"spec\">Display · 800 · −0.035em<\u002Fdiv><div class=\"t-display\">Made for one.<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div class=\"spec\">Heading · 700 · −0.025em<\u002Fdiv><div class=\"t-h1\">Built by the same hands.<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div class=\"spec\">Subhead · 600 · −0.015em<\u002Fdiv><div class=\"t-h2\">Built around how you work.<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div class=\"spec\">Body · 400 · 1.6<\u002Fdiv><div class=\"t-body\">We design and build the thing itself, then stay with it. What we make is yours — running in your hands, not ours.<\u002Fdiv><\u002Fdiv>\n      <div class=\"row\"><div class=\"spec\">Label · 600 · +0.18em · caps<\u002Fdiv><div class=\"t-label\">Selected work<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"weights\">\n      <div style=\"font-weight:300\">Neosmart<small>Light · rare, large only<\u002Fsmall><\u002Fdiv>\n      <div style=\"font-weight:400\">Neosmart<small>Regular · body<\u002Fsmall><\u002Fdiv>\n      <div style=\"font-weight:500\">Neosmart<small>Medium · tagline<\u002Fsmall><\u002Fdiv>\n      <div style=\"font-weight:600\">Neosmart<small>Semibold · subhead<\u002Fsmall><\u002Fdiv>\n      <div style=\"font-weight:700\">Neosmart<small>Bold · heading<\u002Fsmall><\u002Fdiv>\n      <div style=\"font-weight:800\">Neosmart<span class=\"dot\">.<\u002Fspan><small>Extrabold · wordmark<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"rules-grid\">\n      <div>\n        <h4>Tracking<\u002Fh4>\n        <div class=\"demo-line\"><div class=\"tx track-loose\">Neosmart builds<\u002Fdiv><div class=\"lbl\">Too loose — drifts, looks uncertain<\u002Fdiv><\u002Fdiv>\n        <div class=\"demo-line\"><div class=\"tx track-tight\">Neosmart builds<\u002Fdiv><div class=\"lbl\">Too tight — letters collide<\u002Fdiv><\u002Fdiv>\n        <div class=\"demo-line good\"><div class=\"tx track-right\">Neosmart builds<\u002Fdiv><div class=\"lbl\">Correct — display −0.03 to −0.035em · body 0 · labels +0.18em caps<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <h4>Leading<\u002Fh4>\n        <div class=\"demo-line\"><div class=\"tx lead-loose\" style=\"font-size:0.95rem;font-weight:400\">Built around you,<br>and yours to keep.<\u002Fdiv><div class=\"lbl\">Too loose — lines float apart<\u002Fdiv><\u002Fdiv>\n        <div class=\"demo-line\"><div class=\"tx lead-tight\" style=\"font-size:0.95rem;font-weight:400\">Built around you,<br>and yours to keep.<\u002Fdiv><div class=\"lbl\">Too tight — lines crowd<\u002Fdiv><\u002Fdiv>\n        <div class=\"demo-line good\"><div class=\"tx lead-right\" style=\"font-size:0.95rem;font-weight:400\">Built around you,<br>and yours to keep.<\u002Fdiv><div class=\"lbl\">Correct — body 1.6 · display 0.95–1.0<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- MOTIF -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">The signature<\u002Fspan>\n    <h2 class=\"section-title\">The measure. It measures — it doesn't decorate.<\u002Fh2>\n    <p class=\"lede\">A tailor's rule: tick marks borrowed from measuring cloth. It only appears where it does a job — dividing sections, marking a list, carrying scale. Used as ornament, it breaks the one rule the studio refuses to break.<\u002Fp>\n    <div class=\"motif-demos\">\n      <div class=\"md\"><div class=\"ruler\" aria-hidden=\"true\"><\u002Fdiv><div class=\"cap\">As a section rule<\u002Fdiv><\u002Fdiv>\n      <div class=\"md\"><ul class=\"tick-list\"><li>Intelligent systems<\u002Fli><li>Products, sketch to production<\u002Fli><li>Brand &amp; growth<\u002Fli><\u002Ful><div class=\"cap\">As a list marker<\u002Fdiv><\u002Fdiv>\n      <div class=\"md\"><div class=\"tick-vert\" aria-hidden=\"true\"><i style=\"height:30%\"><\u002Fi><i style=\"height:55%\"><\u002Fi><i style=\"height:40%\"><\u002Fi><i style=\"height:80%\"><\u002Fi><i style=\"height:50%\"><\u002Fi><i style=\"height:100%;background:var(--oxblood)\"><\u002Fi><i style=\"height:45%\"><\u002Fi><i style=\"height:65%\"><\u002Fi><\u002Fdiv><div class=\"cap\">As a scale / accent<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- VOICE -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Voice<\u002Fspan>\n    <h2 class=\"section-title\">Speak from their side. One promise, said once.<\u002Fh2>\n    <div class=\"voice-grid\">\n      <div class=\"bignum\">Yours<span class=\"dot\">.<\u002Fspan><small>Everything we build,<br>you own and run.<br>We hand you the keys.<\u002Fsmall><\u002Fdiv>\n      <div>\n        <span class=\"eyebrow\">The refusal — a brand asset, published<\u002Fspan>\n        <div class=\"refusal\">\n          <p>“We don't accept projects where design is treated as decoration.”<\u002Fp>\n          <p>“We work with founders who value clarity over speed.”<\u002Fp>\n        <\u002Fdiv>\n        <p class=\"body\" style=\"margin-top:22px\">Write from the client's side of the screen — “yours,” “your product,” “built around you.” One call to action, said once, never chased. Claims checkable within one scroll. We never count clients or advertise scarcity; the care shows in the work, not in how exclusive it sounds.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"words\">\n      <div class=\"own\"><h4>Words we own<\u002Fh4><div class=\"chips\"><span class=\"chip-w\">yours<\u002Fspan><span class=\"chip-w\">built around you<\u002Fspan><span class=\"chip-w\">the same hands<\u002Fspan><span class=\"chip-w\">considered<\u002Fspan><span class=\"chip-w\">exact<\u002Fspan><span class=\"chip-w\">for one<\u002Fspan><span class=\"chip-w\">precise<\u002Fspan><span class=\"chip-w\">unhurried<\u002Fspan><span class=\"chip-w\">deliberate<\u002Fspan><span class=\"chip-w\">quiet<\u002Fspan><span class=\"chip-w\">built to last<\u002Fspan><span class=\"chip-w\">studio<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"ban\"><h4>Words we never use<\u002Fh4><div class=\"chips\"><span class=\"chip-w\">premium<\u002Fspan><span class=\"chip-w\">luxury<\u002Fspan><span class=\"chip-w\">selective<\u002Fspan><span class=\"chip-w\">exclusive<\u002Fspan><span class=\"chip-w\">a few at a time<\u002Fspan><span class=\"chip-w\">world-class<\u002Fspan><span class=\"chip-w\">seamless<\u002Fspan><span class=\"chip-w\">agency<\u002Fspan><span class=\"chip-w\">transformation<\u002Fspan><span class=\"chip-w\">10x<\u002Fspan><span class=\"chip-w\">unlock<\u002Fspan><span class=\"chip-w\">solutions<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CH.04 IN ACTION ============ -->\n<section class=\"divider\">\n  <div class=\"wrap inner\">\n    <div><div class=\"num\">04<\u002Fdiv><div class=\"name\">In action<\u002Fdiv><\u002Fdiv>\n    <div class=\"desc\">The system resolving into real surfaces — built only from the rules above.<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ruler on-ink\" aria-hidden=\"true\"><\u002Fdiv>\n<\u002Fsection>\n\n<!-- HERO -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Homepage hero<\u002Fspan>\n    <h2 class=\"section-title\">Everything, working together.<\u002Fh2>\n    <div class=\"preview\">\n      <div class=\"pv-nav\"><div class=\"pm\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv><div class=\"pn\">Studio<\u002Fdiv><\u002Fdiv>\n      <div class=\"pv-body\">\n        <span class=\"pv-eyebrow\">Built around you<\u002Fspan>\n        <h2 class=\"pv-head\">Made for one.<\u002Fh2>\n        <p class=\"pv-sub\">We build your systems, your product, and your brand as one — designed around how you actually work. The people who design it build it, and it's yours when we're done.<\u002Fp>\n        <a class=\"pv-cta\" href=\"#\">Start a conversation<\u002Fa>\n        <p class=\"pv-note\">The people you meet are the people who build it.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ruler on-ink\" aria-hidden=\"true\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOUNDING STATEMENT -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">The founding note<\u002Fspan>\n    <h2 class=\"section-title\">How the site launches — honesty, not a fake portfolio.<\u002Fh2>\n    <p class=\"lede\">Until there's real client work to show, the studio launches on the truth: it's new. This states what an early client gains — never that places are scarce. No counts, no urgency.<\u002Fp>\n    <div class=\"preview\">\n      <div class=\"pv-body\" style=\"padding:64px 30px 56px\">\n        <span class=\"pv-eyebrow\">The honest version<\u002Fspan>\n        <h2 class=\"pv-head\" style=\"font-size:3.2rem;max-width:20ch\">Founding engagements now open.<\u002Fh2>\n        <p class=\"pv-sub\" style=\"max-width:56ch\">Neosmart is new — so instead of inventing a portfolio, here's the honest version. We're taking on our first clients now. Work with us early and you get the studio at its most focused: the same hands from first sketch to finished build, undivided attention, and a real say in how we work. What we build together is the first proof — and, like everything we make, it's yours to keep.<\u002Fp>\n        <a class=\"pv-cta\" href=\"#\">Start a conversation<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"ruler on-ink\" aria-hidden=\"true\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- APPLIED SURFACES -->\n<section>\n  <div class=\"wrap\">\n    <span class=\"eyebrow\">Applied surfaces<\u002Fspan>\n    <h2 class=\"section-title\">Signature, cover, and mark.<\u002Fh2>\n    <div class=\"apps\">\n      <div class=\"app\">\n        <div class=\"cap\">Email signature<\u002Fdiv>\n        <div class=\"sig\">\n          <div class=\"nm\">Aarav Mehta<\u002Fdiv>\n          <div class=\"rl\">Designs &amp; builds · your point of contact<\u002Fdiv>\n          <div class=\"wm\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv>\n          <div class=\"ct\">aarav@neosmartlabs.com<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"app\">\n        <div class=\"cap\">Proposal cover<\u002Fdiv>\n        <div class=\"cover-doc\">\n          <div class=\"wm\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv>\n          <div class=\"mid\"><div class=\"lb\">Proposal · prepared for<\u002Fdiv><div class=\"ti\">Northwind<br>Robotics<\u002Fdiv><\u002Fdiv>\n          <div class=\"ft\">July 2026 · yours to keep<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"app\">\n        <div class=\"cap\">Favicon &amp; avatar<\u002Fdiv>\n        <div class=\"favs\">\n          <div class=\"fav s1\">N<span class=\"dot\">.<\u002Fspan><\u002Fdiv>\n          <div class=\"fav s2\">N<span class=\"dot\">.<\u002Fspan><\u002Fdiv>\n          <div class=\"fav s3\">N<span class=\"dot\">.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"body\" style=\"font-size:0.9rem;color:var(--taupe);margin-top:20px\">Monogram on ink, accent on the stop. Holds down to 24px.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"app\">\n        <div class=\"cap\">Business card · reverse<\u002Fdiv>\n        <div class=\"cover-doc\" style=\"aspect-ratio:16/9\">\n          <div class=\"wm\">Neosmart<span class=\"dot\">.<\u002Fspan><\u002Fdiv>\n          <div class=\"ft\" style=\"display:flex;justify-content:space-between\"><span>Made for one.<\u002Fspan><span>neosmartlabs.com<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"wrap fr\">\n    <span>© 2026 Neosmart Labs<\u002Fspan>\n    <span>Brand Guidelines v2.0 — the how. Read alongside the Brand Document — the why.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n\n<\u002Fbody><\u002Fhtml>"
